services:

  # Customer-facing chatbot (Chainlit + Claude API)
  chatbot:
    build: ./chatbot
    ports:
      - "8000:8000"
    environment:
      - BWS_ACCESS_TOKEN=${CHATBOT_BWS_TOKEN}
      - BWS_ORGANIZATION_ID=${BWS_ORGANIZATION_ID}
      - AVP_POLICY_STORE_ID=${AVP_POLICY_STORE_ID}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db-orders
    networks:
      - app-net

  # Developer portal — demonstrates standard and elevated developer access
  developer:
    build: ./developer
    ports:
      - "8001:8001"
    environment:
      - BWS_ACCESS_TOKEN=${DEVELOPER_BWS_TOKEN}
      - BWS_ORGANIZATION_ID=${BWS_ORGANIZATION_ID}
      - AVP_POLICY_STORE_ID=${AVP_POLICY_STORE_ID}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db-orders
      - db-payments
      - db-logs
    networks:
      - app-net

  # Orders — chatbot (own customer only) and developer (all) can read
  # Postgres password must match DB_ORDERS_PASSWORD stored in BWS
  db-orders:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_ORDERS_PASSWORD}
    volumes:
      - ./postgres/init/orders.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net

  # Payments — developer elevated only; chatbot has no access (AVP ceiling)
  db-payments:
    image: postgres:16
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PAYMENTS_PASSWORD}
    volumes:
      - ./postgres/init/payments.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net

  # System logs — developer standard and elevated; chatbot has no access
  db-logs:
    image: postgres:16
    environment:
      POSTGRES_DB: system_logs
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_LOGS_PASSWORD}
    volumes:
      - ./postgres/init/system_logs.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
